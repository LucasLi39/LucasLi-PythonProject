<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanjiLens</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Upload Section -->
        <section id="upload-section">
            <h1>KanjiLens</h1>
            <p class="subtitle">日本語の本を読もう — Read Japanese books with furigana</p>
            <div class="upload-box">
                <input type="file" id="file-input" accept=".epub,.txt" />
                <label for="file-input" class="file-label">
                    <span class="upload-icon">📚</span>
                    <span>Choose an EPUB or TXT file</span>
                </label>
                <span id="file-name" class="file-name"></span>
                <button id="upload-btn" disabled>Upload & Read</button>
            </div>
            <p class="hint">Supports .epub and .txt files with Japanese text</p>
        </section>

        <!-- Reader Section (hidden until book loaded) -->
        <section id="reader-section" class="hidden">
            <header>
                <div class="header-left">
                    <button id="back-btn" title="Upload another book">← Back</button>
                    <h2 id="book-title"></h2>
                </div>
                <div class="header-right">
                    <button id="toggle-furigana" title="Toggle furigana annotations">あ Furigana</button>
                    <select id="chapter-select" title="Jump to chapter"></select>
                </div>
            </header>

            <main id="reader">
                <div id="content"></div>
            </main>

            <footer>
                <button id="prev-page" disabled>← Prev</button>
                <span id="page-info">Page 1</span>
                <button id="next-page">Next →</button>
            </footer>
        </section>

        <!-- Loading indicator -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing kanji...</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
